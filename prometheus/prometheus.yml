global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'nginx-vts'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: /status/format/prometheus

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
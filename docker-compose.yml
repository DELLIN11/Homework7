version: '3.8'

services:
  db:
    image: postgres:16
    container_name: dz5-db-1
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flask_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: dz5-redis-1
    networks:
      - app_net

  web:
    build: ./app
    container_name: dz5-web-1
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/flask_db
    networks:
      - app_net
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: dz5-nginx-1
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  pg_data:
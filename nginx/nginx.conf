load_module /usr/lib/nginx/modules/ngx_http_vhost_traffic_status_module.so;

events {
    worker_connections 1024;
}

http {
    vhost_traffic_status_zone;

    upstream backend {
        server web:5000;
    }

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=mycache:10m max_size=1g inactive=60m;

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_cache mycache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 302 60m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Эндпоинт для метрик VTS в формате Prometheus
        location /status {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format prometheus;
        }

        # (Опционально) старый эндпоинт stub_status
        location /stub_status {
            stub_status on;
            access_log off;
            allow all;
        }
    }
}